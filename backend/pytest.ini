[pytest]
# pytest configuration for Market Monitor backend

# Test discovery patterns
python_files = test_*.py *_test.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --cov=.
    --cov-report=term-missing
    --cov-report=html
    --cov-exclude=tests/*

# Markers for organizing tests
markers =
    unit: Unit tests for individual components
    integration: Integration tests for API endpoints
    slow: Tests that take longer to run
    cache: Tests for cache functionality
    rate_limit: Tests for rate limiting

# Coverage settings
[coverage:run]
omit = 
    tests/*
    */__pycache__/*
    */venv/*
    */node_modules/*
    test_*.py
    *_test.py

[coverage:report]
precision = 2
show_missing = True
